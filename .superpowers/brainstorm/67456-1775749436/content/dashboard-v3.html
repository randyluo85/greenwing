<div style="margin-top:16px;padding:16px;background:#f8f9fa;border-radius:8px;border-left:4px solid #00897B;">

  <ul style="margin:0;padding-left:20px;color:#4b5563;font-size:13px;line-height:1.8;">
    <li>收入卡片右上角有「月 / 年 / 全部」三个切换按钮</li>
