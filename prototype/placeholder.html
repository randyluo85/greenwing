<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青翼读书会 | 商城</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="base.css">
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="glass-surface px-4 h-14 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center">
            <i class="fas fa-chevron-left text-gray-500 text-lg opacity-0"></i>
        </div>
        <h1 class="text-sm font-bold text-gray-800 uppercase tracking-widest">积分商城</h1>
        <div class="flex items-center space-x-3 bg-gray-50/50 rounded-full px-2 py-1 border border-gray-100">
            <i class="fas fa-ellipsis-h text-gray-500 text-xs"></i>
            <div class="w-[1px] h-3 bg-gray-200"></div>
            <div class="w-3.5 h-3.5 rounded-full border-2 border-gray-500 flex items-center justify-center">
                <div class="w-1.5 h-1.5 bg-gray-500 rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="flex flex-col items-center justify-center min-h-[70vh] px-8 text-center">
        <div class="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center text-primary mb-6 animate-pulse">
            <i class="fas fa-shopping-cart text-3xl"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">装修中，敬请期待</h2>
        <p class="text-sm text-gray-400 leading-relaxed">
            我们将在这里上线丰富的图书周边、活动门票与会员权益，可用参与活动获得的积分兑换。
        </p>
        <button onclick="window.location.href='index.html'" class="mt-8 px-8 py-3 bg-primary text-white rounded-full text-sm font-bold shadow-lg shadow-primary/20 btn-active">
            返回首页
        </button>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 flex items-center justify-between z-50">
        <a href="index.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">首页</span>
        </a>
        <a href="events.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">活动</span>
        </a>
        <a href="placeholder.html" class="flex flex-col items-center space-y-1 text-primary">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="text-[10px] font-bold">商城</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-medium">我的</span>
        </a>
    </nav>

</body>
</html>
