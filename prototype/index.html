<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青翼读书会 | 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="base.css">
</head>

<body class="pb-20">

    <!-- Header -->
    <header class="bg-white px-4 h-14 flex items-center justify-between sticky top-0 z-50">
        <div class="flex-shrink-0 flex items-center">
            <img src="images/logo.png" alt="Logo" class="h-8 object-contain">
        </div>
        <div class="flex-grow mx-3">
            <div class="bg-gray-100/80 rounded-full h-8 flex items-center px-3">
                <i class="fas fa-search text-gray-400 text-xs mr-2"></i>
                <input type="text" placeholder="活动搜索"
                    class="bg-transparent border-none outline-none text-xs w-full text-gray-600">
            </div>
        </div>
        <a href="notifications.html" class="relative flex-shrink-0 flex items-center justify-center p-1">
            <i class="fas fa-bell text-gray-500 text-lg"></i>
            <div class="absolute top-1 right-1 w-1.5 h-1.5 bg-orange-500 rounded-full border border-white"></div>
        </a>
    </header>

    <main class="p-4 space-y-6">

        <!-- Banner Section -->
        <section onclick="location.href='event-detail.html'"
            class="relative rounded overflow-hidden shadow-sm group animate-fade-scale cursor-pointer transition-transform active:scale-[0.98]">


            <div class="aspect-[21/9] w-full">
                <img src="images/banner.png" alt="Featured" class="w-full h-full object-cover">
            </div>
        </section>

        <!-- Quick Actions Grid -->
        <section class="grid grid-cols-2 grid-rows-2 gap-3 h-[170px] animate-fade-up stagger-1">
            <!-- Left Card: 每日签到 -->
            <div id="checkin-btn" onclick="handleCheckIn()"
                class="row-span-2 relative bg-gradient-to-br from-[#5eead4] to-[#ccfbf1] rounded-xl p-4 pl-5 flex flex-col justify-between cursor-pointer shadow-sm overflow-hidden">
                <div class="relative z-10 flex flex-col h-full">
                    <div class="flex items-center space-x-1.5 text-teal-800">
                        <span class="text-[14px] leading-none font-bold">每日签到</span>
                    </div>
                    <div class="mt-2 text-teal-800">
                        <div class="w-4 h-4 bg-teal-500 text-white rounded-full flex items-center justify-center">
                            <i class="fas fa-chevron-right text-[8px]"></i>
                        </div>
                    </div>
                    <div class="mt-auto">
                        <p class="text-[10px] text-teal-700 font-medium mb-0.5">已累计</p>
                        <div class="flex items-end justify-between pr-2">
                            <div class="flex items-baseline space-x-1">
                                <span id="checkin-count"
                                    class="text-[34px] font-bold text-teal-600 tracking-tight leading-none font-sans">128</span>
                                <span class="text-[11px] text-teal-700 font-medium pb-1">天</span>
                            </div>
                            <button
                                class="bg-[#0f766e] text-white text-[11px] font-bold px-3.5 py-1.5 mb-1 rounded-full inline-flex hover:bg-teal-800 transition-colors shadow-lg shadow-teal-500/30 whitespace-nowrap">
                                去签到
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Graphic Icon -->
                <img src="images/signin.png"
                    class="absolute top-2 right-1 w-16 h-16 object-contain z-0 drop-shadow-md opacity-90" alt="">
            </div>

            <!-- Right Top: 积分查询 -->
            <a href="points.html"
                class="relative bg-gradient-to-r from-[#fde68a] to-[#fef3c7] rounded-xl p-3 px-4 flex items-center justify-between cursor-pointer shadow-sm overflow-hidden">
                <div class="flex flex-col h-full justify-center space-y-2 relative z-10 w-full mb-1">
                    <span class="text-[14px] font-bold text-amber-600 pt-1">积分查询</span>
                    <div class="w-4 h-4 bg-orange-500 text-white rounded-full flex items-center justify-center">
                        <i class="fas fa-chevron-right text-[8px]"></i>
                    </div>
                </div>
                <img src="images/point.png" class="w-14 h-14 object-contain relative z-0 mt-1 drop-shadow-sm" alt="">
            </a>

            <!-- Right Bottom: 我的活动 -->
            <a href="events.html"
                class="relative bg-gradient-to-r from-[#dbeafe] to-[#eff6ff] rounded-xl p-3 px-4 flex items-center justify-between cursor-pointer shadow-sm overflow-hidden">
                <div class="flex flex-col h-full justify-center space-y-2 relative z-10 w-full mb-1">
                    <span class="text-[14px] font-bold text-blue-600 pt-1">我的活动</span>
                    <div class="w-4 h-4 bg-blue-500 text-white rounded-full flex items-center justify-center">
                        <i class="fas fa-chevron-right text-[8px]"></i>
                    </div>
                </div>
                <img src="images/scan.png" class="w-14 h-14 object-contain relative z-0 mt-1 drop-shadow-sm" alt="">
            </a>
        </section>


        <!-- Popular Activities -->
        <section class="space-y-4 animate-fade-up flex-shrink-0 mt-6">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center">
                    <h3 class="text-[17px] font-bold text-gray-800 tracking-wide">热门活动</h3>
                    <img src="images/fire.png" class="w-4 h-5 ml-1 object-contain" alt="">
                </div>
                <span
                    class="text-[10px] text-gray-500 border border-gray-200 rounded-full px-2.5 py-0.5 flex items-center justify-center">更多
                    <i class="fas fa-chevron-right text-[8px] ml-1"></i></span>
            </div>

            <div class="space-y-4">
                <!-- Activity Card Item 1 -->
                <div onclick="location.href='event-detail.html'"
                    class="flex cursor-pointer transition-transform active:scale-[0.98]">
                    <div class="w-[100px] h-[135px] flex-shrink-0 overflow-hidden rounded-[4px] relative">
                        <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
                            alt="Event" class="w-full h-full object-cover">
                    </div>
                    <div class="ml-3.5 flex-grow flex flex-col py-0.5">
                        <h4 class="text-[15px] font-bold text-gray-800 leading-snug line-clamp-2 pr-2">
                            古典主义回响：维吉尔《埃涅阿斯纪》···</h4>
                        <div class="flex items-center space-x-1.5 mt-2.5">
                            <span
                                class="bg-[#14b8a6] text-white text-[10px] font-medium px-1.5 py-0.5 rounded-sm leading-none">报名中</span>
                            <span
                                class="text-[#f59e0b] border border-[#f59e0b] text-[10px] font-medium px-1.5 py-[3px] rounded-[3px] leading-none">100积分</span>
                        </div>
                        <div class="mt-auto space-y-1.5 mb-0.5">
                            <div class="flex items-center text-[11px] text-gray-400">
                                <i class="far fa-clock w-3.5 text-center mr-1 text-gray-300"></i>
                                <span>04/08 星期三 15:30</span>
                            </div>
                            <div class="flex items-center text-[11px] text-gray-400">
                                <i class="fas fa-map-marker-alt w-3.5 text-center mr-1 text-gray-300"></i>
                                <span>青翼读书会·主茶室</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Activity Card Item 2 -->
                <div onclick="location.href='event-detail.html'"
                    class="flex cursor-pointer transition-transform active:scale-[0.98]">
                    <div class="w-[100px] h-[135px] flex-shrink-0 overflow-hidden rounded-[4px] relative">
                        <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
                            alt="Event" class="w-full h-full object-cover">
                    </div>
                    <div class="ml-3.5 flex-grow flex flex-col py-0.5">
                        <h4 class="text-[15px] font-bold text-gray-800 leading-snug line-clamp-2 pr-2">博尔赫斯的迷宫：《小径分岔的花园》
                        </h4>
                        <div class="flex items-center space-x-1.5 mt-2.5">
                            <span
                                class="bg-gray-200 text-gray-500 text-[10px] font-medium px-1.5 py-[3px] rounded-sm leading-none">已结束</span>
                            <span
                                class="text-[#f59e0b] border border-[#f59e0b] text-[10px] font-medium px-1.5 py-[3px] rounded-[3px] leading-none">100积分</span>
                        </div>
                        <div class="mt-auto space-y-1.5 mb-0.5">
                            <div class="flex items-center text-[11px] text-gray-400">
                                <i class="far fa-clock w-3.5 text-center mr-1 text-gray-300"></i>
                                <span>04/08 星期三 15:30</span>
                            </div>
                            <div class="flex items-center text-[11px] text-gray-400">
                                <i class="fas fa-map-marker-alt w-3.5 text-center mr-1 text-gray-300"></i>
                                <span>青翼读书会·主茶室</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Good Book Recommendations -->
        <section class="space-y-4 animate-fade-up pb-2 mt-6">
            <div class="flex items-center justify-between mb-1">
                <div class="flex items-center">
                    <h3 class="text-[17px] font-bold text-gray-800 tracking-wide">好书推荐</h3>
                    <img src="images/thumb.png" class="w-5 h-5 ml-1 object-contain" alt="thumb">
                </div>
                <span onclick="location.href='books.html'"
                    class="text-[10px] text-gray-500 border border-gray-200 rounded-full px-2.5 py-0.5 flex items-center justify-center cursor-pointer active:bg-gray-50 transition-colors">更多
                    <i class="fas fa-chevron-right text-[8px] ml-1"></i></span>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <!-- Book 1 -->
                <div onclick="location.href='book-detail.html'"
                    class="space-y-2 cursor-pointer transition-transform active:scale-[0.98]">
                    <div class="relative aspect-[3/4] w-full rounded-md shadow-sm overflow-hidden bg-gray-100">
                        <img src="images/book1.png" alt="Book 1" class="w-full h-full object-cover">
                        <div
                            class="absolute top-0 left-0 bg-[#f59e0b] text-white text-[9px] px-1.5 py-0.5 font-bold rounded-br-md">
                            9.8</div>
                    </div>
                    <div class="space-y-0.5">
                        <h4 class="text-[13px] font-bold text-gray-800 line-clamp-1">咸的玩笑</h4>
                        <p class="text-[10px] text-gray-400">刘震云</p>
                    </div>
                </div>
                <!-- Book 2 -->
                <div onclick="location.href='book-detail.html'"
                    class="space-y-2 cursor-pointer transition-transform active:scale-[0.98]">
                    <div class="relative aspect-[3/4] w-full rounded-md shadow-sm overflow-hidden bg-gray-100">
                        <img src="images/book2.png" alt="Book 2" class="w-full h-full object-cover">
                        <div
                            class="absolute top-0 left-0 bg-[#f59e0b] text-white text-[9px] px-1.5 py-0.5 font-bold rounded-br-md">
                            9.5</div>
                    </div>
                    <div class="space-y-0.5">
                        <h4 class="text-[13px] font-bold text-gray-800 line-clamp-1">天色已晚</h4>
                        <p class="text-[10px] text-gray-400">克莱尔·吉根</p>
                    </div>
                </div>
                <!-- Book 3 -->
                <div onclick="location.href='book-detail.html'"
                    class="space-y-2 cursor-pointer transition-transform active:scale-[0.98]">
                    <div class="relative aspect-[3/4] w-full rounded-md shadow-sm overflow-hidden bg-gray-100">
                        <img src="images/book1.png" alt="Book 3" class="w-full h-full object-cover">
                        <div
                            class="absolute top-0 left-0 bg-[#f59e0b] text-white text-[9px] px-1.5 py-0.5 font-bold rounded-br-md">
                            9.2</div>
                    </div>
                    <div class="space-y-0.5">
                        <h4 class="text-[13px] font-bold text-gray-800 line-clamp-1">只剩你一个</h4>
                        <p class="text-[10px] text-gray-400">赖利·萨格</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Nav -->
    <nav
        class="fixed bottom-0 left-0 right-0 h-[68px] bg-white border-t border-gray-100 px-8 flex items-center justify-between z-50 pt-2 pb-1 text-center">
        <a href="index.html" class="flex flex-col items-center space-y-1 text-[#14b8a6]">
            <i class="fas fa-home text-[22px]"></i>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="events.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="far fa-flag text-[20px]"></i>
            <span class="text-[10px] font-medium">活动</span>
        </a>
        <a href="placeholder.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-shopping-bag text-[20px]"></i>
            <span class="text-[10px] font-medium">商城</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="far fa-smile text-[20px]"></i>
            <span class="text-[10px] font-medium">我的</span>
        </a>
        <div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-black rounded-full"></div>
    </nav>

    <!-- Check-in Success Modal -->
    <div id="checkin-modal" class="fixed inset-0 z-[100] hidden flex-col items-center justify-center p-8 bg-black/60">
        <div class="w-full max-w-[280px] rounded-[16px] overflow-hidden shadow-2xl relative animate-fade-in-up flex flex-col">
            <!-- Top Half -->
            <div class="relative w-full h-[130px] bg-white">
                <img src="images/sign.png" alt="" class="absolute inset-0 w-full h-[130px] object-cover">
            </div>
            <!-- Bottom Half -->
            <div class="bg-white px-6 pt-7 pb-8 flex flex-col items-center text-center">
                <h3 class="text-[17px] font-bold text-gray-800 mb-3">签到成功</h3>
                <div class="flex items-end justify-center text-[#f59e0b] font-bold mb-3">
                    <span class="text-xl leading-none mr-0.5 pb-1">+</span>
                    <span class="text-[40px] leading-none tracking-tighter">10</span>
                    <span class="text-[11px] pb-1.5 ml-1">积分</span>
                </div>
                <p class="text-[12px] text-gray-400 font-medium tracking-wide">已连续签到 1 天</p>
            </div>
        </div>
        <!-- Close button -->
        <button onclick="closeCheckinModal()" class="mt-8 w-8 h-8 rounded-full border-[1.5px] border-white/80 text-white flex items-center justify-center active:scale-95 transition-transform">
            <i class="fas fa-times text-sm opacity-80"></i>
        </button>
    </div>

    <style>
        .animate-fade-in-up {
            animation: fadeInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>

    <script>
        function handleCheckIn() {
            const modal = document.getElementById('checkin-modal');
            const countEl = document.getElementById('checkin-count');

            // Show modal
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            // Increment count (visual only)
            if (!window.hasCheckedIn) {
                const currentCount = parseInt(countEl.textContent);
                countEl.textContent = currentCount + 1;
                window.hasCheckedIn = true;
            }
        }

        function closeCheckinModal() {
            const modal = document.getElementById('checkin-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>

</html>
