<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青翼读书会 | 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="base.css">
</head>

<body class="pb-20">

    <!-- Header -->
    <header class="bg-white px-4 h-16 flex items-center justify-between sticky top-0 z-50 border-b border-gray-100">
        <div class="flex-none w-14"></div> <!-- Spacer for centering -->
        <h1 class="text-lg font-bold text-gray-800 flex-grow text-center">青翼读书会</h1>
        <div
            class="flex items-center space-x-3 bg-gray-50 rounded-full px-2 py-1 border border-gray-100 flex-none ml-4">
            <i class="fas fa-ellipsis-h text-gray-400 text-[10px]"></i>
            <div class="w-[1px] h-3 bg-gray-200"></div>
            <div class="w-3.5 h-3.5 rounded-full border-2 border-gray-400 flex items-center justify-center">
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6">

        <!-- Banner Section -->
        <section onclick="location.href='event-detail.html'"
            class="relative rounded overflow-hidden shadow-sm group animate-fade-scale cursor-pointer transition-transform active:scale-[0.98]">
            <!-- Search Overlay and Notification -->
            <div class="absolute top-4 left-4 right-4 z-10 flex items-center space-x-3">
                <div
                    class="flex-grow bg-white/20 backdrop-blur-md rounded h-10 flex items-center px-4 border border-white/30">
                    <i class="fas fa-search text-white mr-2 text-sm"></i>
                    <input type="text" placeholder="书籍、活动搜索"
                        class="bg-transparent border-none outline-none text-xs w-full text-white placeholder-white/70">
                </div>
                <a href="notifications.html" class="relative flex items-center justify-center p-2">
                    <i class="fas fa-bell text-white text-lg"></i>
                    <div
                        class="absolute top-1.5 right-1.5 w-2 h-2 bg-orange-500 rounded-full border-2 border-transparent">
                    </div>
                </a>
            </div>

            <div class="aspect-[16/9] w-full">
                <img src="https://images.unsplash.com/photo-1519682337058-a94d519337bc?auto=format&fit=crop&q=80&w=1200"
                    alt="Featured" class="w-full h-full object-cover">
                <div class="absolute inset-0 flex flex-col justify-end p-5 text-white">
                    <h2 class="text-xl font-bold">秋季古典文学研习会</h2>
                    <p class="text-xs text-white/80 mt-1.5 line-clamp-1">古典主义回响：维吉尔《埃涅阿斯纪》精读小组</p>
                    <div class="flex justify-between items-center mt-4">
                        <div class="flex space-x-1.5">
                            <div class="w-1.5 h-1.5 rounded-full bg-white"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-white/40"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-white/40"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-white/40"></div>
                        </div>
                        <span class="text-[10px] bg-black/20 px-2 py-0.5 rounded-full">1/4</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quick Actions Grid -->
        <section class="grid grid-cols-2 grid-rows-2 gap-3 h-48 animate-fade-up stagger-1">
            <!-- Left Card: 每日签到 -->
            <div id="checkin-btn" onclick="handleCheckIn()"
                class="row-span-2 bg-white border border-[#E0F2F1] rounded p-4 flex flex-col justify-between btn-active cursor-pointer shadow-[0_2px_8px_rgba(0,0,0,0.02)]">
                <div class="space-y-1.5">
                    <div class="flex items-center space-x-1">
                        <h3 class="text-sm font-bold text-gray-800">每日签到</h3>
                        <i class="fas fa-check-circle text-[10px] text-[#4DB6AC] ml-1"></i>
                    </div>
                    <div class="w-5 h-0.5 bg-[#4DB6AC] rounded-full"></div>
                </div>
                <div class="flex items-end justify-between">
                    <div class="mb-1">
                        <p class="text-[10px] text-gray-400 font-medium mb-1">累计签到</p>
                        <div class="flex items-baseline space-x-1">
                            <span id="checkin-count" class="text-3xl font-bold text-[#00897B] leading-none">325</span>
                            <span class="text-[10px] text-gray-400 font-bold">天</span>
                        </div>
                    </div>
                    <div class="w-10 h-10 bg-[#E0F2F1] rounded flex items-center justify-center text-[#26A69A]">
                        <i class="fas fa-calendar-check text-xl"></i>
                    </div>
                </div>
            </div>

            <!-- Right Top: 积分查询 -->
            <a href="points.html"
                class="bg-white border border-[#E0F2F1] rounded px-4 py-3 flex items-center justify-between btn-active cursor-pointer shadow-[0_2px_8px_rgba(0,0,0,0.02)]">
                <div class="space-y-1.5">
                    <div class="flex items-center space-x-1">
                        <h3 class="text-sm font-bold text-gray-800">积分查询</h3>
                        <i class="fas fa-arrow-right text-[8px] text-[#4DB6AC] ml-1"></i>
                    </div>
                    <div class="w-5 h-0.5 bg-[#4DB6AC] rounded-full"></div>
                </div>
                <div class="w-9 h-9 bg-[#E0F2F1] rounded flex items-center justify-center text-[#26A69A]">
                    <i class="fas fa-wallet text-lg"></i>
                </div>
            </a>

            <!-- Right Bottom: 活动核销 -->
            <a href="event-verify.html"
                class="bg-white border border-[#E0F2F1] rounded px-4 py-3 flex items-center justify-between btn-active cursor-pointer shadow-[0_2px_8px_rgba(0,0,0,0.02)]">
                <div class="space-y-1.5">
                    <div class="flex items-center space-x-1">
                        <h3 class="text-sm font-bold text-gray-800">活动核销</h3>
                        <i class="fas fa-arrow-right text-[8px] text-[#4DB6AC] ml-1"></i>
                    </div>
                    <div class="w-5 h-0.5 bg-[#4DB6AC] rounded-full"></div>
                </div>
                <div class="w-9 h-9 bg-[#E0F2F1] rounded flex items-center justify-center text-[#26A69A]">
                    <i class="fas fa-qrcode text-lg"></i>
                </div>
            </a>
        </section>


        <!-- Popular Activities -->
        <section class="space-y-4 animate-fade-up stagger-2">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-[17px] font-bold text-gray-800">热门活动</h3>
                <span class="text-xs text-gray-500">更多 <i class="fas fa-chevron-right text-[7px] ml-0.5"></i></span>
            </div>

            <div class="space-y-4">
                <!-- Activity Card Item 1 -->
                <div onclick="location.href='event-detail.html'"
                    class="bg-white rounded-2xl p-4 flex shadow-[0_2px_12px_-2px_rgba(0,0,0,0.04)] border border-gray-100/50 group hover-lift animate-fade-up stagger-1 cursor-pointer">
                    <div class="relative w-32 h-32 flex-shrink-0 overflow-hidden rounded-xl">
                        <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
                            alt="Event"
                            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-2 left-2">
                            <span
                                class="bg-primary text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm">进行中</span>
                        </div>
                    </div>
                    <div class="ml-4 flex-grow flex flex-col justify-between py-1">
                        <div class="space-y-1.5">
                            <h4
                                class="text-[16px] font-bold text-gray-800 leading-tight line-clamp-2 group-hover:text-primary transition-colors">
                                古典主义回响：维吉尔《埃涅阿斯纪》精读研讨会</h4>
                            <div class="flex flex-col space-y-1 opacity-60">
                                <div class="flex items-center text-[12px] text-gray-500">
                                    <i class="far fa-clock mr-1.5 text-primary/70"></i>
                                    <span>04/08 15:30</span>
                                </div>
                                <div class="flex items-center text-[12px] text-gray-500">
                                    <i class="fas fa-map-marker-alt mr-1.5 text-primary/70"></i>
                                    <span>青翼书社 · 线下讲堂</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span
                                class="text-[12px] text-emerald-600 font-medium bg-emerald-50 px-2 py-0.5 rounded-full">156人已订</span>
                            <button
                                class="bg-primary text-white text-[11px] font-bold px-5 py-2 rounded-full shadow-lg shadow-emerald-100/50 hover:bg-primary-dark transition-all active:scale-95">立即预约</button>
                        </div>
                    </div>
                </div>

                <!-- Activity Card Item 2 -->
                <div onclick="location.href='event-detail.html'"
                    class="bg-white rounded-2xl p-4 flex shadow-[0_2px_12px_-2px_rgba(0,0,0,0.04)] border border-gray-100/50 group hover-lift animate-fade-up stagger-2 cursor-pointer opacity-90">
                    <div
                        class="relative w-32 h-32 flex-shrink-0 overflow-hidden rounded-xl grayscale-[40%] group-hover:grayscale-0 transition-all duration-700">
                        <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
                            alt="Event"
                            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-2 left-2">
                            <span
                                class="bg-gray-400 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm">已结束</span>
                        </div>
                    </div>
                    <div class="ml-4 flex-grow flex flex-col justify-between py-1">
                        <div class="space-y-1.5">
                            <h4
                                class="text-[16px] font-bold text-gray-500 leading-tight line-clamp-2 group-hover:text-gray-700 transition-colors">
                                博尔赫斯的迷宫：《小径分岔的花园》分享会</h4>
                            <div class="flex items-center text-[12px] text-gray-400">
                                <i class="far fa-clock mr-1.5"></i> 活动已结束
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-[12px] text-gray-400 font-medium">856人参加过</span>
                            <button
                                class="bg-gray-100 text-gray-400 text-[11px] font-bold px-5 py-2 rounded-full cursor-not-allowed">精彩回顾</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Good Book Recommendations -->
        <section class="space-y-4 animate-fade-up stagger-3">
            <div class="flex items-center justify-between">
                <h3 class="text-[17px] font-bold text-gray-800">好书推荐</h3>
                <span class="text-xs text-gray-500">更多 <i class="fas fa-chevron-right text-[7px] ml-0.5"></i></span>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <!-- Book 1 -->
                <div onclick="location.href='placeholder.html'" class="space-y-2 cursor-pointer btn-active">
                    <div
                        class="relative aspect-[3/4] w-full rounded-sm shadow-sm overflow-hidden border border-gray-100">
                        <img src="https://covers.openlibrary.org/b/id/12547191-L.jpg" alt="Book"
                            class="w-full h-full object-cover">
                        <div class="absolute top-0 left-0 rating-badge text-white text-[9px] px-1 py-0.5 font-bold">8.7
                        </div>
                    </div>
                    <div class="space-y-0.5">
                        <h4 class="text-[11px] font-bold text-gray-800 line-clamp-1">咸的玩笑</h4>
                        <p class="text-[9px] text-gray-400">刘震云</p>
                    </div>
                </div>
                <!-- Book 2 -->
                <div onclick="location.href='placeholder.html'" class="space-y-2 cursor-pointer btn-active">
                    <div
                        class="relative aspect-[3/4] w-full rounded-sm shadow-sm overflow-hidden border border-gray-100">
                        <img src="https://covers.openlibrary.org/b/id/8225266-L.jpg" alt="Book"
                            class="w-full h-full object-cover">
                        <div class="absolute top-0 left-0 rating-badge text-white text-[9px] px-1 py-0.5 font-bold">9.2
                        </div>
                    </div>
                    <div class="space-y-0.5">
                        <h4 class="text-[11px] font-bold text-gray-800 line-clamp-1">天色已晚</h4>
                        <p class="text-[9px] text-gray-400">克莱尔·吉根</p>
                    </div>
                </div>
                <!-- Book 3 -->
                <div onclick="location.href='placeholder.html'" class="space-y-2 cursor-pointer btn-active">
                    <div
                        class="relative aspect-[3/4] w-full rounded-sm shadow-sm overflow-hidden border border-gray-100">
                        <img src="https://covers.openlibrary.org/b/id/10540457-L.jpg" alt="Book"
                            class="w-full h-full object-cover">
                        <div class="absolute top-0 left-0 rating-badge text-white text-[9px] px-1 py-0.5 font-bold">8.5
                        </div>
                    </div>
                    <div class="space-y-0.5">
                        <h4 class="text-[11px] font-bold text-gray-800 line-clamp-1">只剩你一个</h4>
                        <p class="text-[9px] text-gray-400">莫诺</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Nav -->
    <!-- Bottom Nav -->
    <nav
        class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 flex items-center justify-between z-50">
        <a href="index.html" class="flex flex-col items-center space-y-1 text-primary">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="events.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">活动</span>
        </a>
        <a href="placeholder.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="text-[10px] font-medium">商城</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-medium">我的</span>
        </a>
    </nav>

    <!-- Check-in Success Modal -->
    <div id="checkin-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="bg-white rounded-2xl p-8 flex flex-col items-center space-y-4 shadow-2xl relative animate-enter">
            <div class="w-16 h-16 bg-[#E0F2F1] rounded-full flex items-center justify-center text-[#26A69A]">
                <i class="fas fa-check-circle text-3xl"></i>
            </div>
            <div class="text-center space-y-1">
                <h3 class="text-lg font-bold text-gray-900">今日签到任务完成</h3>
                <p class="text-sm text-gray-500">恭喜获得 5 积分奖励</p>
            </div>
            <button onclick="closeCheckinModal()"
                class="w-full py-3 bg-primary text-white rounded-full font-bold shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                太棒了
            </button>
        </div>
    </div>

    <script>
        function handleCheckIn() {
            const modal = document.getElementById('checkin-modal');
            const countEl = document.getElementById('checkin-count');

            // Show modal
            modal.classList.remove('hidden');

            // Increment count (visual only)
            if (!window.hasCheckedIn) {
                const currentCount = parseInt(countEl.textContent);
                countEl.textContent = currentCount + 1;
                window.hasCheckedIn = true;
            }
        }

        function closeCheckinModal() {
            document.getElementById('checkin-modal').classList.add('hidden');
        }
    </script>

</body>

</html>
