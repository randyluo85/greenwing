<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息通知 | 青翼读书会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="base.css">
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="bg-white px-4 h-14 flex items-center justify-between sticky top-0 z-50">
        <a href="javascript:history.back()" class="flex-none w-10 flex items-center">
            <i class="fas fa-chevron-left text-gray-800 text-lg"></i>
        </a>
        <h1 class="text-[17px] font-bold text-gray-800 flex-grow text-center">消息中心</h1>
        <div class="flex-none w-10 text-right">
        </div>
    </header>

    <main class="bg-white">
        <!-- New Messages Section -->
        <div class="bg-gray-100/60 flex items-center h-10 px-4 text-[13px] text-gray-800 font-bold border-b border-gray-100/50">
            新消息
        </div>
        
        <div class="px-5">
            <!-- Item 1 -->
            <div class="py-[18px] flex items-center justify-between border-b border-gray-100">
                <div class="w-[42px] h-[42px] bg-[#5c8deb] rounded-full flex items-center justify-center text-white flex-shrink-0">
                    <i class="far fa-bookmark text-[18px]"></i>
                </div>
                <div class="flex-grow ml-3">
                    <div class="flex justify-between items-baseline mb-1 mt-0.5">
                        <h4 class="text-[15px] font-bold text-gray-800 tracking-wide">活动报名成功。</h4>
                        <span class="text-[11px] text-gray-400">刚刚</span>
                    </div>
                    <div class="flex justify-between items-center pr-0.5">
                        <p class="text-[13px] text-gray-400 truncate w-[240px]">您已成功报名《百年孤独》精读研讨会...</p>
                        <div class="w-1.5 h-1.5 rounded-full bg-[#fbbf24] flex-shrink-0"></div>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="py-[18px] flex items-center justify-between border-b border-gray-100">
                <div class="w-[42px] h-[42px] bg-[#fb923c] rounded-full flex items-center justify-center text-white flex-shrink-0">
                    <i class="fas fa-coins text-[18px]"></i>
                </div>
                <div class="flex-grow ml-3">
                    <div class="flex justify-between items-baseline mb-1 mt-0.5">
                        <h4 class="text-[15px] font-bold text-gray-800 tracking-wide">积分奖励发放。</h4>
                        <span class="text-[11px] text-gray-400">1小时前</span>
                    </div>
                    <div class="flex justify-between items-center pr-0.5">
                        <p class="text-[13px] text-gray-400 truncate w-[240px]">您已连续签到7天，系统已发放50额...</p>
                        <div class="w-1.5 h-1.5 rounded-full bg-[#fbbf24] flex-shrink-0"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Earlier Messages Section -->
        <div class="bg-gray-100/60 flex items-center h-10 px-4 text-[13px] text-gray-800 font-bold border-y border-gray-100/50">
            更早消息
        </div>

        <div class="px-5">
            <!-- Item 3 -->
            <div class="py-[18px] flex items-center justify-between border-b border-gray-100">
                <div class="w-[42px] h-[42px] bg-[#f05232] rounded-full flex items-center justify-center text-white flex-shrink-0">
                    <i class="fas fa-cogs text-[18px]"></i>
                </div>
                <div class="flex-grow ml-3">
                    <div class="flex justify-between items-baseline mb-1 mt-0.5">
                        <h4 class="text-[15px] font-bold text-gray-800 tracking-wide">系统维护公告。</h4>
                        <span class="text-[11px] text-gray-400">昨天</span>
                    </div>
                    <div class="flex justify-between items-center pr-0.5">
                        <p class="text-[13px] text-gray-400 truncate w-[240px]">服务器将于本周进行维护，届时服务可...</p>
                    </div>
                </div>
            </div>

            <!-- Item 4 -->
            <div class="py-[18px] flex items-center justify-between border-b border-gray-100">
                <div class="w-[42px] h-[42px] bg-[#14b8a6] rounded-full flex items-center justify-center text-white flex-shrink-0">
                    <i class="fas fa-bullhorn text-[18px]"></i>
                </div>
                <div class="flex-grow ml-3">
                    <div class="flex justify-between items-baseline mb-1 mt-0.5">
                        <h4 class="text-[15px] font-bold text-gray-800 tracking-wide">系统消息</h4>
                        <span class="text-[11px] text-gray-400">2月21日</span>
                    </div>
                    <div class="flex justify-between items-center pr-0.5">
                        <p class="text-[13px] text-gray-400 truncate w-[240px]">欢迎注册青翼读书会会员！社群活动与...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 h-[68px] bg-white border-t border-gray-100 px-8 flex items-center justify-between z-50 pt-2 pb-1 text-center">
        <a href="index.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-home text-[22px]"></i>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="events.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="far fa-flag text-[20px]"></i>
            <span class="text-[10px] font-medium">活动</span>
        </a>
        <a href="placeholder.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-shopping-bag text-[20px]"></i>
            <span class="text-[10px] font-medium">商城</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="far fa-smile text-[20px]"></i>
            <span class="text-[10px] font-medium">我的</span>
        </a>
        <div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-black rounded-full"></div>
    </nav>
</body>
</html>
