<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>青翼读书会 | 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00897B',
                        emerald: {
                            50: '#F0FDF4',
                            500: '#10B981',
                            600: '#059669',
                            900: '#064E3B',
                        }
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'PingFang SC', system-ui, -apple-system, sans-serif;
            background-color: #F8FAFC;
            -webkit-font-smoothing: antialiased;
        }
        .btn-active:active { transform: scale(0.96); transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8 bg-[#F8FAFC]">

    <!-- Main Content Area -->
    <main class="w-full max-w-sm flex flex-col items-center animate-fade-up">
        
        <!-- Branding Container -->
        <div class="mb-12 flex flex-col items-center text-center">
            <div class="mb-10 animate-float">
                <img src="https://images.unsplash.com/photo-1589118949245-7d38baf380d6?auto=format&fit=crop&q=80&w=200" alt="Logo" class="w-44 h-auto drop-shadow-sm rounded-lg">
            </div>
            
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight mb-3">青翼读书会</h1>
            <div class="h-1 w-8 bg-primary rounded-full mb-4"></div>
            <p class="text-gray-400 text-xs tracking-[0.3em] font-medium">赋能你的知识</p>
        </div>

        <!-- Action Section -->
        <div class="w-full space-y-6">
            <button onclick="simulateWeChatLogin()" 
                    class="w-full h-16 bg-white border border-gray-100 shadow-sm rounded-2xl flex items-center justify-center space-x-4 btn-active group transition-all hover:border-emerald-100 hover:shadow-emerald-900/5">
                <div class="w-10 h-10 bg-[#07C160] rounded-full flex items-center justify-center shadow-lg shadow-[#07C160]/20 transition-transform group-hover:scale-110">
                    <i class="fab fa-weixin text-white text-xl"></i>
                </div>
                <span class="text-gray-800 font-semibold tracking-wider text-base">微信授权登录</span>
            </button>

            <!-- Subtle Decorative Element -->
            <div class="flex items-center justify-center space-x-3 opacity-40">
                <div class="h-px w-8 bg-gray-300"></div>
                <span class="text-[10px] text-gray-400 font-bold tracking-widest">安全可靠</span>
                <div class="h-px w-8 bg-gray-300"></div>
            </div>
        </div>

        <!-- Terms & Footer -->
        <div class="mt-20 text-center animate-fade-up" style="animation-delay: 0.3s;">
            <p class="text-[11px] text-gray-400 leading-relaxed max-w-[240px] mx-auto">
                登录即代表您同意 <br>
                <a href="#" class="text-primary font-bold hover:underline underline-offset-4">《用户协议》</a> 
                与 
                <a href="#" class="text-primary font-bold hover:underline underline-offset-4">《隐私保护指引》</a>
            </p>
        </div>
    </main>

    <script>
        function simulateWeChatLogin() {
            const btn = event.currentTarget;
            btn.disabled = true;
            const content = btn.querySelector('span');
            const iconContainer = btn.querySelector('.w-10');
            
            content.textContent = '授权验证中...';
            iconContainer.innerHTML = '<i class="fas fa-circle-notch fa-spin text-white text-xl"></i>';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1800);
        }
    </script>
</body>
</html>
