<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑资料 | 青翼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#00897B' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'PingFang SC', system-ui, sans-serif; background-color: #F8FAFC; }
        .input-box { background: #FFFFFF; border: 1px solid #F1F5F9; border-radius: 12px; padding: 14px 16px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input-box:focus { border-color: #00897B; }
    </style>
</head>
<body class="pb-10">
    <header class="fixed top-0 left-0 right-0 h-11 flex items-center justify-between px-4 bg-white/80 backdrop-blur-md z-50 border-b border-gray-50">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center text-gray-400">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h1 class="text-lg font-bold text-gray-800 flex-grow text-center">个人资料</h1>
        <div class="w-10 flex items-center justify-end">
            <button onclick="history.back()" class="text-primary font-bold text-sm">保存</button>
        </div>
    </header>

    <main class="mt-14 px-4 space-y-6">
        <!-- Avatar Section -->
        <section class="py-8 flex flex-col items-center">
            <div class="relative">
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-md">
                    <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&q=80&w=150" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <div class="absolute bottom-0 right-0 w-8 h-8 bg-primary rounded-full border-2 border-white flex items-center justify-center text-white text-xs">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <p class="mt-4 text-[12px] text-gray-400">点击更换头像</p>
        </section>

        <!-- Form fields -->
        <div class="space-y-4">
            <div class="flex flex-col space-y-2">
                <label class="text-[12px] font-bold text-gray-400 ml-4">昵称</label>
                <input type="text" value="林晚舟" class="input-box">
            </div>

            <div class="flex flex-col space-y-2">
                <label class="text-[12px] font-bold text-gray-400 ml-4">个人签名</label>
                <textarea rows="3" class="input-box resize-none">心如工画师，能画诸世间。</textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col space-y-2">
                    <label class="text-[12px] font-bold text-gray-400 ml-4">性别</label>
                    <select class="input-box appearance-none">
                        <option>男</option>
                        <option selected>女</option>
                        <option>隐私</option>
                    </select>
                </div>
                <div class="flex flex-col space-y-2">
                    <label class="text-[12px] font-bold text-gray-400 ml-4">生日</label>
                    <input type="date" value="1998-05-20" class="input-box">
                </div>
            </div>

            <div class="flex flex-col space-y-2">
                <label class="text-[12px] font-bold text-gray-400 ml-4">联系电话</label>
                <input type="tel" value="138****0941" disabled class="input-box bg-gray-50 text-gray-400">
                <p class="text-[10px] text-gray-300 ml-4">手机号用于活动签到，修改请联系管理员</p>
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="pt-10">
            <p class="text-center text-[12px] text-gray-300">加入青翼读书会已 365 天</p>
        </div>
    </main>
</body>
</html>
