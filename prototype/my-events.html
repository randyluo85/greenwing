<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的活动 | 青翼读书会</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="base.css">
    <style>
        .timeline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            left: 0;
            top: 6px;
            background: #cbd5e1;
            z-index: 10;
        }
        .timeline-dot.active {
            background: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 137, 123, 0.1);
        }
        .timeline-line {
            width: 2px;
            background: #f1f5f9;
            position: absolute;
            left: 4px;
            top: 16px;
            bottom: -24px;
        }
        .timeline-item:last-child .timeline-line {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <!-- Header -->
    <header class="glass-surface px-4 h-14 flex items-center justify-between sticky top-0 z-50 border-b border-gray-100">
        <div class="flex items-center">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center -ml-2 btn-active">
                <i class="fas fa-chevron-left text-gray-800 text-lg"></i>
            </button>
        </div>
        <h1 class="text-lg font-bold text-gray-800 flex-grow text-center">我的活动</h1>
        <div class="w-10 h-10 flex items-center justify-center -mr-2">
            <i class="far fa-calendar-alt text-primary opacity-60"></i>
        </div>
    </header>

    <!-- Tabs Container (Synced with events.html) -->
    <div class="bg-white border-b border-gray-100 sticky top-14 z-40 px-6">
        <div class="flex space-x-10 py-1">
            <a href="events.html" class="relative py-4 text-xs font-bold text-gray-400 tracking-wider uppercase transition-all hover:text-gray-600">
                即将进行的活动
            </a>
            <button class="relative py-4 text-xs font-bold text-primary tracking-wider uppercase transition-all">
                我的活动
                <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-primary rounded-full"></div>
            </button>
        </div>
    </div>

    <main class="p-6">
        <div class="flex items-center justify-between mb-8 px-1">
            <h2 class="text-xs font-black uppercase tracking-[0.1em] text-gray-400">已预约活动</h2>
            <span class="text-[10px] text-gray-400">共 2 个</span>
        </div>
        
        <div class="space-y-10">
            
            <!-- Event 1 (Tomorrow) -->
            <div class="relative pl-8 timeline-item">
                <div class="timeline-dot active"></div>
                <div class="timeline-line"></div>
                
                <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm space-y-4 btn-active">
                    <div class="flex justify-between items-start">
                        <div class="space-y-1">
                            <p class="text-xs font-semibold text-primary">明天 14:00 - 17:00</p>
                            <h4 class="text-[15px] font-bold text-gray-900 leading-tight">《周末读诗》· 暮春特辑</h4>
                        </div>
                        <span class="text-[10px] font-bold text-accent bg-accent/10 px-2 py-0.5 rounded">即将开始</span>
                    </div>
                    
                    <div class="flex items-center space-x-2 text-[11px] text-gray-500">
                        <i class="fas fa-map-marker-alt text-gray-300"></i>
                         <span>青翼读书会 · 主茶室</span>
                    </div>
                    
                    <div class="flex space-x-3 pt-1">
                        <button onclick="openQRModal()" class="flex-[2] bg-primary text-white text-[12px] font-bold py-3 rounded-xl shadow-lg shadow-primary/20 btn-active">
                             入场凭证
                        </button>
                        <button class="flex-1 border border-gray-200 text-gray-400 text-[12px] font-bold py-3 rounded-xl btn-active">
                             取消
                        </button>
                    </div>
                </div>
            </div>

            <!-- Event 2 (Next Week) -->
            <div class="relative pl-8 timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-line"></div>
                
                <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm space-y-3 opacity-95 btn-active">
                    <div class="flex justify-between items-start">
                        <div class="space-y-1">
                            <p class="text-xs font-semibold text-gray-400">4月19日 (周六) 15:30</p>
                            <h4 class="text-[15px] font-bold text-gray-800 leading-tight">字体与排版设计美学讲座</h4>
                        </div>
                        <span class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded">已预约</span>
                    </div>
                    
                    <div class="flex items-center space-x-2 text-[11px] text-gray-500">
                        <i class="fas fa-map-marker-alt text-gray-300"></i>
                        <span>青翼读书会 · 创意工坊</span>
                    </div>
                </div>
            </div>

            <!-- Event 3 (Divider for Past) -->
            <div class="py-4 text-center">
                <span class="text-[10px] uppercase font-black tracking-widest text-gray-300">历史足迹</span>
            </div>

        </div>
    </main>

    <!-- QR Modal -->
    <div id="qrModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeQRModal()"></div>
        <div class="bg-white rounded-3xl p-8 w-full max-w-[340px] relative flex flex-col items-center shadow-2xl animate-fade-up">
            <button onclick="closeQRModal()" class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center text-gray-300 hover:text-gray-800 transition-colors">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-1">Entry Pass</h3>
            <p class="text-[13px] font-bold text-primary text-center mb-8 px-4 leading-tight">《周末读诗》· 暮春特辑</p>
            
            <div class="p-6 bg-gray-50 rounded-2xl border border-gray-100 mb-8 relative group">
                <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=GW_893021_EVENT" alt="QR Code" class="w-44 h-44 mix-blend-multiply transition-transform group-hover:scale-[1.02]">
            </div>
            
            <div class="text-center space-y-2">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Verification Code</p>
                <div class="flex space-x-3">
                    <span class="text-2xl font-black tracking-[0.2em] text-gray-900">893</span>
                    <span class="text-2xl font-black tracking-[0.2em] text-gray-900">021</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 flex items-center justify-between z-50">
        <a href="index.html" class="flex flex-col items-center space-y-1 text-gray-400 btn-active">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">首页</span>
        </a>
        <a href="events.html" class="flex flex-col items-center space-y-1 text-primary btn-active">
            <div class="relative">
                <i class="fas fa-compass text-xl"></i>
                <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></div>
            </div>
            <span class="text-[10px] font-bold">活动</span>
        </a>
        <a href="placeholder.html" class="flex flex-col items-center space-y-1 text-gray-400 btn-active">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="text-[10px] font-medium">商城</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center space-y-1 text-gray-400 btn-active">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-medium">我的</span>
        </a>
    </nav>

    <script>
        function openQRModal() {
            const modal = document.getElementById('qrModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }
        function closeQRModal() {
            const modal = document.getElementById('qrModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
