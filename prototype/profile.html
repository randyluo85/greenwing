<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青翼读书会 | 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="base.css">
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-white px-4 h-14 flex items-center justify-between sticky top-0 z-50">
        <a href="index.html" class="flex-none w-10 flex items-center">
            <i class="fas fa-chevron-left text-gray-800 text-lg"></i>
        </a>
        <h1 class="text-[17px] font-bold text-gray-800 flex-grow text-center">我的</h1>
        <div class="flex-none w-10"></div>
    </header>

    <!-- Main Body Background -->
    <div class="fixed top-0 left-0 right-0 h-[350px] -z-10">
        <img src="images/profile_bg.png" class="w-full h-full object-cover" alt="">
    </div>

    <main class="space-y-0 text-gray-800">
        
        <!-- User Header Section -->
        <section class="h-[210px] relative px-4 flex flex-col justify-end pb-8">
            <div class="flex items-center space-x-4 mb-8">
                <div class="w-[72px] h-[72px] rounded-full overflow-hidden border border-white/20 shadow-md">
                    <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&q=80&w=150" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <div class="space-y-1">
                    <div class="flex items-center space-x-2">
                        <h2 class="text-[22px] font-bold text-gray-900 tracking-wide">QingQing</h2>
                        <div class="w-5 h-5 rounded-full bg-white/80 flex items-center justify-center">
                            <i class="fas fa-crown text-[#a3aab8] text-[9px]"></i>
                        </div>
                    </div>
                    <p class="text-[11px] text-white/90">阅读，是心灵的旅行。</p>
                </div>
            </div>
            
            <div class="space-y-2.5">
                <div class="flex justify-between items-end px-1">
                    <span class="bg-white/40 backdrop-blur-sm px-3.5 py-1 rounded-full text-[11px] text-white font-medium shadow-sm border border-white/20">白银会员</span>
                    <span class="text-[12px] font-bold text-gray-800">距离升级还需 <span class="text-[#fbbf24] text-lg font-bold">300</span> 积分</span>
                </div>
                <div class="w-full h-[6px] bg-white/70 rounded-full overflow-hidden shadow-inner">
                    <div class="h-full bg-[#14b8a6] rounded-full" style="width: 70%;"></div>
                </div>
            </div>
        </section>

        <div class="px-4">
            <!-- Stats Row -->
            <section class="bg-white rounded-xl p-5 py-6 shadow-sm border border-gray-50 flex justify-between relative -mt-3 z-10 mx-auto">
                <div class="text-center flex-1">
                    <div class="flex justify-center items-baseline text-[#14b8a6] mb-1">
                        <span class="text-[34px] font-bold tracking-tighter leading-none">128</span>
                        <span class="text-[11px] ml-0.5">天</span>
                    </div>
                    <p class="text-[11px] text-gray-500 font-medium">累计签到</p>
                </div>
                <div class="w-[1px] h-12 bg-gray-100 self-center"></div>
                <div class="text-center flex-1">
                    <div class="flex justify-center items-baseline text-[#14b8a6] mb-1">
                        <span class="text-[34px] font-bold tracking-tighter leading-none">1200</span>
                        <span class="text-[11px] ml-0.5">分</span>
                    </div>
                    <p class="text-[11px] text-gray-500 font-medium">我的积分</p>
                </div>
                <div class="w-[1px] h-12 bg-gray-100 self-center"></div>
                <div class="text-center flex-1">
                    <div class="flex justify-center items-baseline text-[#14b8a6] mb-1">
                        <span class="text-[34px] font-bold tracking-tighter leading-none">12</span>
                        <span class="text-[11px] ml-0.5">场</span>
                    </div>
                    <p class="text-[11px] text-gray-500 font-medium">参加活动</p>
                </div>
            </section>

            <!-- Actions Menu Card -->
            <section class="bg-white rounded-xl shadow-sm border border-gray-50 mt-4 flex flex-col px-5 text-[15px] font-bold text-gray-800">
                <a href="event-verify.html" class="flex items-center justify-between py-4 border-b border-gray-100/60 active:bg-gray-50 transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                            <i class="fas fa-expand text-[15px]"></i>
                        </div>
                        <span>活动核销 <span class="text-[13px] text-gray-400 font-medium ml-0.5">(仅工作人员使用)</span></span>
                    </div>
                    <i class="fas fa-chevron-right text-[11px] text-gray-300 font-normal"></i>
                </a>

                <a href="events.html#mine" class="flex items-center justify-between py-4 border-b border-gray-100/60 active:bg-gray-50 transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                            <i class="far fa-bookmark text-[15px]"></i>
                        </div>
                        <span>我的活动</span>
                    </div>
                    <i class="fas fa-chevron-right text-[11px] text-gray-300 font-normal"></i>
                </a>

                <a href="points.html" class="flex items-center justify-between py-4 border-b border-gray-100/60 active:bg-gray-50 transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="w-9 h-9 rounded-full bg-[#f0f9ff] flex items-center justify-center text-[#14b8a6]">
                            <i class="fas fa-coins text-[15px]"></i>
                        </div>
                        <span>积分明细</span>
                    </div>
                    <i class="fas fa-chevron-right text-[11px] text-gray-300 font-normal"></i>
                </a>

                <a href="profile-edit.html" class="flex items-center justify-between py-4 active:bg-gray-50 transition-colors">
                    <div class="flex items-center space-x-4">
                        <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                            <i class="far fa-user text-[15px]"></i>
                        </div>
                        <span>账号设置与管理</span>
                    </div>
                    <i class="fas fa-chevron-right text-[11px] text-gray-300 font-normal"></i>
                </a>
            </section>

            <!-- Logout Button -->
            <button onclick="window.location.href='login.html'" class="w-full py-4 mt-4 text-[15px] font-bold text-[#14b8a6] bg-white rounded-xl flex items-center justify-center shadow-sm border border-gray-50 btn-active">
                <i class="fas fa-power-off mr-2 text-lg"></i>
                退出登录
            </button>

            <!-- Footer Logo -->
            <div class="mt-8 mb-4 flex justify-center opacity-80 mix-blend-multiply">
                <img src="images/logo.png" alt="青翼读书会" class="h-10 object-contain grayscale-[20%]">
            </div>
        </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 h-[68px] bg-white border-t border-gray-100 px-8 flex items-center justify-between z-50 pt-2 pb-1 text-center">
        <a href="index.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-home text-[22px]"></i>
            <span class="text-[10px] font-bold">首页</span>
        </a>
        <a href="events.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="far fa-flag text-[20px]"></i>
            <span class="text-[10px] font-medium">活动</span>
        </a>
        <a href="placeholder.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-shopping-bag text-[20px]"></i>
            <span class="text-[10px] font-medium">商城</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center space-y-1 text-[#14b8a6]">
            <i class="far fa-smile text-[20px]"></i>
            <span class="text-[10px] font-medium">我的</span>
        </a>
        <div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-black rounded-full"></div>
    </nav>

</body>
</html>
