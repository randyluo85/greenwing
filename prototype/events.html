<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青翼读书会 | 发现活动</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="base.css">
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="glass-surface px-4 h-14 flex items-center justify-between sticky top-0 z-50">
        <div class="flex-none w-14"></div>
        <h1 class="text-lg font-bold text-gray-800 flex-grow text-center">活动列表</h1>
        <div class="flex items-center space-x-3 bg-gray-50/50 rounded-full px-2 py-1 border border-gray-100">
            <i class="fas fa-ellipsis-h text-gray-500 text-xs"></i>
            <div class="w-[1px] h-3 bg-gray-200"></div>
            <div class="w-3.5 h-3.5 rounded-full border-2 border-gray-500 flex items-center justify-center">
                <div class="w-1.5 h-1.5 bg-gray-500 rounded-full"></div>
            </div>
        </div>
    </header>

    <!-- Search and Tabs Bar -->
    <div class="bg-white border-b border-gray-100 sticky top-14 z-40">
        <div class="p-4 pt-4 pb-2">
            <div class="bg-gray-50 border border-gray-100 rounded h-10 flex items-center px-4">
                <i class="fas fa-search text-gray-400 mr-2 text-sm"></i>
                <input type="text" placeholder="搜索感兴趣的活动" class="bg-transparent border-none outline-none text-xs w-full text-gray-600">
            </div>
        </div>
        <div class="flex px-4 overflow-x-auto no-scrollbar">
            <div class="flex space-x-8 py-2">
                <div class="relative cursor-pointer text-primary border-b-2 border-primary pb-2 px-1">
                    <span class="text-xs font-bold tracking-wider uppercase">即将进行的活动</span>
                </div>
                <a href="my-events.html" class="relative cursor-pointer text-gray-400 pb-2 px-1 hover:text-gray-600 transition-colors">
                    <span class="text-xs font-bold tracking-wider uppercase">我的活动</span>
                </a>
            </div>
        </div>
    </div>

    <main class="p-4 space-y-5">
        
        <!-- Event Card 1 -->
        <article onclick="window.location.href='event-detail.html'" class="bg-white border border-gray-100 rounded overflow-hidden shadow-sm btn-active cursor-pointer">
            <div class="aspect-[16/8] relative">
                <img src="https://images.unsplash.com/photo-1478147427282-58a87a120781?auto=format&fit=crop&q=80&w=800" alt="Poetry Event" class="w-full h-full object-cover">
                <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-sm text-[9px] font-bold text-primary uppercase tracking-widest border border-primary/20">报名中</div>
                <div class="absolute bottom-3 left-3 flex space-x-2">
                    <span class="bg-black/40 backdrop-blur-md text-white px-2 py-0.5 rounded-sm text-[9px] font-bold">128 关注</span>
                </div>
            </div>
            <div class="p-4">
                <h2 class="text-lg font-bold text-gray-800 leading-tight">《周末读诗》· 暮春特辑</h2>
                <p class="text-[11px] text-gray-400 mt-2 line-clamp-2 leading-relaxed">在这个暮春的黄昏，让我们相聚读书会，读一首诗，喝一杯茶，让心灵在这里片刻栖息。</p>
                
                <div class="mt-4 pt-4 border-t border-gray-50 flex items-center justify-between">
                    <div class="space-y-1">
                        <div class="flex items-center text-[10px] text-gray-400 font-medium">
                            <i class="far fa-calendar-alt w-4 text-primary"></i>
                            <span>04/12 (周六) 14:00</span>
                        </div>
                        <div class="flex items-center text-[10px] text-gray-400 font-medium">
                            <i class="fas fa-map-marker-alt w-4 text-primary"></i>
                            <span>青翼读书会 · 主茶室</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400 font-medium uppercase tracking-tighter">兑换积分</p>
                            <p class="text-sm font-black text-primary italic">100 积分</p>
                        </div>
                        <button onclick="rsvp(event, this)" class="bg-[#E0F2F1] text-primary border border-primary/20 px-4 py-2 rounded text-xs font-bold hover:bg-primary hover:text-white transition-all uppercase tracking-widest">报名</button>
                    </div>
                </div>
            </div>
        </article>

        <!-- Event Card 2 -->
        <article onclick="window.location.href='event-detail.html'" class="bg-white border border-gray-100 rounded overflow-hidden shadow-sm btn-active cursor-pointer">
            <div class="aspect-[16/8] relative">
                <img src="https://images.unsplash.com/photo-1510531704581-5b2870972060?auto=format&fit=crop&q=80&w=800" alt="Design Event" class="w-full h-full object-cover">
                <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-sm text-[9px] font-bold text-[#FF9800] uppercase tracking-widest border border-[#FF9800]/20">即将截止</div>
            </div>
            <div class="p-4">
                <h2 class="text-lg font-bold text-gray-800 leading-tight">《设计美学》· 字体设计</h2>
                <p class="text-[11px] text-gray-400 mt-2 line-clamp-2 leading-relaxed">探索汉字排版的隐秘规律，在字里行间发现设计之美。特邀资深设计师现场分享。</p>
                
                <div class="mt-4 pt-4 border-t border-gray-50 flex items-center justify-between">
                    <div class="space-y-1">
                        <div class="flex items-center text-[10px] text-gray-400 font-medium">
                            <i class="far fa-calendar-alt w-4 text-primary"></i>
                            <span>04/19 (周六) 15:30</span>
                        </div>
                        <div class="flex items-center text-[10px] text-gray-400 font-medium">
                            <i class="fas fa-map-marker-alt w-4 text-primary"></i>
                            <span>青翼读书会 · 创意工坊</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400 font-medium uppercase tracking-tighter">兑换积分</p>
                            <p class="text-sm font-black text-primary italic">5 积分</p>
                        </div>
                        <button onclick="rsvp(event, this)" class="bg-[#E0F2F1] text-primary border border-primary/20 px-4 py-2 rounded text-xs font-bold hover:bg-primary hover:text-white transition-all uppercase tracking-widest">报名</button>
                    </div>
                </div>
            </div>
        </article>

    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 flex items-center justify-between z-50">
        <a href="index.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">首页</span>
        </a>
        <a href="events.html" class="flex flex-col items-center space-y-1 text-primary">
            <i class="fas fa-compass text-xl"></i>
            <span class="text-[10px] font-bold">活动</span>
        </a>
        <a href="placeholder.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span class="text-[10px] font-medium">商城</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center space-y-1 text-gray-400">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-medium">我的</span>
        </a>
    </nav>

    <!-- Toast Element -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span>报名成功，已从账户扣除积分</span>
    </div>

    <script>
        function rsvp(e, btn) {
            e.preventDefault();
            e.stopPropagation();
            
            if (btn.classList.contains('bg-primary')) return;
            
            btn.innerHTML = '<i class="fas fa-check mr-2"></i>已报名';
            btn.classList.remove('bg-[#E0F2F1]', 'text-primary');
            btn.classList.add('bg-primary', 'text-white', 'border-transparent');
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
