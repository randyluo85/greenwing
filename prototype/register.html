<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青翼 | 欢迎加入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00897B',
                        secondary: '#26A69A',
                        bg: '#FFFFFF',
                    },
                    borderRadius: {
                        'full': '9999px',
                        '2xl': '16px',
                        '3xl': '24px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'PingFang SC', system-ui, -apple-system, sans-serif;
            background-color: #FFFFFF;
            color: #1E293B;
            -webkit-font-smoothing: antialiased;
        }
        .input-focus:focus {
            box-shadow: 0 0 0 2px rgba(0, 137, 123, 0.1);
            border-color: #00897B;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-enter { animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-8 pt-20">

    <!-- Hero Section -->
    <header class="text-center space-y-4 mb-20 animate-enter">
        <div class="mx-auto mb-10 translate-y-2">
            <img src="https://images.unsplash.com/photo-1589118949245-7d38baf380d6?auto=format&fit=crop&q=80&w=200" alt="Logo" class="w-44 h-auto mx-auto drop-shadow-sm rounded-lg">
        </div>
        <div class="space-y-1">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900">欢迎来到青翼</h1>
            <p class="text-gray-400 text-sm">阅读，让我们发现更大的世界</p>
        </div>
    </header>

    <!-- Auth Options -->
    <main class="flex-1 flex flex-col justify-end pb-12">
        <div id="wechat-view" class="space-y-6">
            <button onclick="switchToForm()" class="w-full py-4 bg-[#07C160] text-white rounded-full font-bold flex items-center justify-center space-x-2 shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                <i class="fab fa-weixin text-xl"></i>
                <span>微信一键登录</span>
            </button>
            <div class="text-center">
                <p class="text-[11px] text-gray-300">
                    登录即代表您已阅读并同意 <a href="#" class="text-primary font-bold">用户协议</a> 与 <a href="#" class="text-primary font-bold">隐私政策</a>
                </p>
            </div>
        </div>

        <!-- Form View (Hidden Initially) -->
        <div id="form-view" class="hidden space-y-6 animate-enter">
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 ml-4">您的姓名</label>
                    <input type="text" placeholder="输入真实姓名以获取勋章" class="w-full px-6 py-4 bg-gray-50 border border-transparent rounded-full text-sm outline-none transition-all input-focus">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 ml-4">手机号码</label>
                    <input type="tel" placeholder="用于活动入场核验" class="w-full px-6 py-4 bg-gray-50 border border-transparent rounded-full text-sm outline-none transition-all input-focus">
                </div>
            </div>
            
            <button onclick="finishAuth()" class="w-full py-4 bg-primary text-white rounded-full font-bold shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                开启探索之旅
            </button>
            
            <button onclick="backToWechat()" class="w-full text-xs text-gray-300 font-bold">
                切换其他账号
            </button>
        </div>
    </main>

    <script>
        function switchToForm() {
            document.getElementById('wechat-view').classList.add('hidden');
            document.getElementById('form-view').classList.remove('hidden');
        }
        function backToWechat() {
            document.getElementById('form-view').classList.add('hidden');
            document.getElementById('wechat-view').classList.remove('hidden');
        }
        function finishAuth() {
            // Simplified for prototype
            location.href = 'index.html';
        }
    </script>
</body>
</html>
